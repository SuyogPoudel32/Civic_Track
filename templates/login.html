{% extends 'base.html' %}

{% block content %}

<div class="lg:h-auto h-full  flex justify-center items-center">

    <div class="h-full w-full flex justify-center p-5 items-center h-full">

        <form id="form" method="POST"
            class=" w-full md:w-[520px] mt-[5rem]  border border-white/15 p-10 rounded-[25px] shadow-2xl">


            <p class="text-slate-300 mb-8 text-center">
                Login to continue reporting civic issues
            </p>

            <!-- Email -->
            <div class="flex items-center bg-white/10 rounded-2xl p-4 mb-5">
                <i class="fa fa-envelope text-slate-400"></i>

                <input id="email" name="email" type="email" placeholder="Email Address"
                    class="flex-1 bg-transparent border-none outline-none text-white pl-3 placeholder-slate-400">
            </div>

            <!-- Password -->
            <div class="flex items-center bg-white/10 rounded-2xl p-4 mb-5 relative">
                <i class="fa fa-lock text-slate-400"></i>

                <input id="password" name="password" type="password" id="loginPassword" placeholder="Password"
                    class="relative flex bg-transparent border-none outline-none text-white pl-3 placeholder-slate-400">

                <i class="fa fa-eye text-slate-400 cursor-pointer absolute right-7" onclick="togglePassword('password', this)">
                </i>
            </div>

            <!-- Options -->
            <div class="flex justify-between text-sm text-white mb-6">
                <!-- <label class="flex items-center gap-2">
                    <input id="checkbox" type="checkbox">
                    Remember Me
                </label> -->

                <a href="#" class="text-sky-400 hover:underline">
                    Forgot Password?
                </a>
            </div>

            <!-- Login Button -->
            <button type="submit"
                class="w-full py-4 rounded-2xl font-bold bg-sky-400 text-black hover:-translate-y-1 hover:shadow-lg transition duration-300">
                Login
            </button>

            <div class="text-center my-5 text-slate-400">
                OR
            </div>

            <a href="register.html" class="block text-center text-sky-400 hover:underline">
                Create New Account
            </a>

        </form>

    </div>


</div>

{%endblock%}
{% block extra_js %}

<script src="{{ url_for('static', filename='src/js/validate.js') }}"></script>
<script src="{{ url_for('static', filename='src/js/togglePassword.js') }}"></script>
{% endblock %}
